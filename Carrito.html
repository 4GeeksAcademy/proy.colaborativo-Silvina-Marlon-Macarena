<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | Loop</title>
    <meta name="description" content="Carrito de compras de Loop con productos de ejemplo.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Poppins", "ui-sans-serif", "system-ui", "sans-serif"]
                    },
                    colors: {
                        loop: {
                            50: "#ecfeff",
                            100: "#cffafe",
                            600: "#0891b2",
                            700: "#0f766e",
                            900: "#0f172a"
                        }
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/95 backdrop-blur">
        <nav aria-label="Barra principal" class="mx-auto w-[92%] max-w-6xl py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold tracking-tight text-slate-900">Loop</a>
            <!-- Buscador -->
            <form action="index.html" method="get" role="search" class="flex-1 mx-4 max-w-md">
                <label for="busqueda" class="sr-only">Buscar productos</label>
                <div class="flex items-center rounded-full border border-slate-300 bg-white px-4 py-2 shadow-sm">
                    <input id="busqueda" name="busqueda" type="search" placeholder="Buscar productos" class="w-full border-none bg-transparent text-sm outline-none placeholder:text-slate-400" autocomplete="off">
                </div>
            </form>
            <!-- Mi cuenta y carrito -->
            <div class="flex items-center gap-3">
                <button type="button" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-800 transition hover:border-loop-600 hover:text-loop-700">Mi cuenta</button>
                <a href="Carrito.html" aria-label="Ver carrito de compras" class="inline-flex items-center justify-center rounded-full border border-slate-300 bg-white p-2 text-slate-800 transition hover:border-loop-600 hover:text-loop-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m13-9l2 9m-5-9V5" />
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <main id="contenido" class="mx-auto w-[92%] max-w-6xl py-8 md:py-10">
        <h1 class="mb-6 text-3xl font-bold tracking-tight">Carrito de compras</h1>

        <!-- Lista de productos en el carrito -->
        <ul id="cart-list" class="space-y-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"></ul>

        <!-- Resumen de totales -->
        <div class="mt-6 rounded-xl border border-slate-200 bg-slate-50 p-4 text-right space-y-2">
            <p>Subtotal: <strong id="subtotal">UYU 0,00</strong></p>
            <p>Impuestos (22%): <strong id="taxes">UYU 0,00</strong></p>
            <p class="text-xl font-bold">Total: <strong id="total">UYU 0,00</strong></p>
            <a href="Formulario-de-pago.html" class="mt-4 inline-flex w-full justify-center rounded-full border border-loop-700 bg-loop-700 px-6 py-3 text-sm font-medium text-white transition hover:bg-loop-600 md:w-auto">Comprar</a>
        </div>
    </main>

    <footer class="border-t border-slate-200 bg-slate-900 text-slate-200 py-6 text-center text-sm">
        © 2026 Loop. Todos los derechos reservados.
    </footer>

    <script>
        // Productos de ejemplo
        const cartItems = [
            { id: 1, name: "Chaleco Lisy", sku: "Art. 226210105006-027-03", size: "Talle 3", unitPrice: 1990, discount: 656.7, quantity: 1, image: "https://images.unsplash.com/photo-1548883354-94bcfe321cbb?auto=format&fit=crop&w=140&q=80" },
            { id: 2, name: "Cinto Klein", sku: "Art. 226112207301-002-01", size: "Talle único", unitPrice: 590, discount: 194.7, quantity: 1, image: "https://images.unsplash.com/photo-1601924928580-3e5d5f1f8d89?auto=format&fit=crop&w=140&q=80" },
            { id: 3, name: "Billetera Benny", sku: "Art. 226113807107-002-01", size: "Talle único", unitPrice: 490, discount: 161.7, quantity: 1, image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?auto=format&fit=crop&w=140&q=80" }
        ];

        const listElement = document.getElementById("cart-list");
        const subtotalElement = document.getElementById("subtotal");
        const taxesElement = document.getElementById("taxes");
        const totalElement = document.getElementById("total");

        const formatCurrency = value => `UYU ${value.toFixed(2)}`;

        function renderCart() {
            listElement.innerHTML = "";

            cartItems.forEach(item => {
                const lineTotal = (item.unitPrice - item.discount) * item.quantity;

                const row = document.createElement("li");
                row.className = "grid grid-cols-1 gap-4 rounded-xl border border-slate-200 p-4 sm:grid-cols-[120px,1fr,1fr] sm:items-center";
                row.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="h-28 w-full rounded-lg bg-slate-100 object-contain p-2">
                    <div>
                        <h2 class="text-xl font-semibold text-slate-900">${item.name}</h2>
                        <p class="text-sm text-slate-500 mt-1">SKU: ${item.sku}</p>
                        <p class="text-sm text-slate-500 mt-1">Talla: ${item.size}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-base font-semibold text-slate-900">Precio unitario: ${formatCurrency(item.unitPrice - item.discount)}</p>
                        <p class="text-base font-semibold text-slate-900 mt-1">Total: ${formatCurrency(lineTotal)}</p>
                    </div>
                `;
                listElement.appendChild(row);
            });

            const subtotal = cartItems.reduce((acc, item) => acc + (item.unitPrice - item.discount) * item.quantity, 0);
            const taxes = subtotal * 0.22;
            const total = subtotal + taxes;

            subtotalElement.textContent = formatCurrency(subtotal);
            taxesElement.textContent = formatCurrency(taxes);
            totalElement.textContent = formatCurrency(total);
        }

        renderCart();
    </script>
</body>
</html>
