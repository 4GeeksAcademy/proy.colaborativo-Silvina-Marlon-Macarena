<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./favicon.ico">
  <title>Checkout PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<main class="max-w-5xl mx-auto p-6 bg-white shadow-md mt-10 rounded">

  <h1 class="text-2xl font-bold mb-6">Finalizar compra</h1>

  <form id="checkoutForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">

    <!-- IZQUIERDA -->
    <div>

      <!-- DATOS -->
      <section class="mb-6">
        <h2 class="font-semibold mb-3">Datos personales</h2>

        <div class="space-y-3">
          <input required name="nombreCompleto" placeholder="Nombre completo" class="input">
          <input type="email" required name="email" placeholder="Email" class="input">
          <input type="tel" required name="telefono" placeholder="Teléfono" class="input">
        </div>
      </section>

      <!-- DIRECCIÓN -->
      <section class="mb-6">
        <h2 class="font-semibold mb-3">Dirección</h2>

        <div class="space-y-3">
          <input required name="direccion" placeholder="Dirección" class="input">
          <input required name="ciudad" placeholder="Ciudad" class="input">
          <input required name="departamento" placeholder="Departamento" class="input">
          <input required name="codigoPostal" placeholder="Código postal" class="input">
        </div>
      </section>

      <!-- PAGOS -->
      <section>
        <h2 class="font-semibold mb-4">Método de pago</h2>

        <!-- TARJETA -->
        <div class="metodo border rounded p-4 mb-4 transition">
          <label class="flex justify-between mb-2 cursor-pointer">
            <div class="flex gap-2">
              <input type="radio" name="metodo_pago" value="tarjeta" checked>
              <span>Tarjeta (15% OFF)</span>
            </div>
            <div class="flex gap-2 items-center">
              <img src="./Tarjetas/visa-logo-548541.jpg" alt="Visa" class="h-6 object-contain">
              <img src="./Tarjetas/MasterCard_Logo.svg.png" alt="Mastercard" class="h-6 object-contain">
            </div>
          </label>

          <div class="grid grid-cols-2 gap-3">
            <input name="titularTarjeta" placeholder="Nombre del titular" class="input campo">
            <input name="numeroTarjeta" placeholder="Número de tarjeta (16 dígitos)" class="input campo" id="cardNumber" maxlength="16" inputmode="numeric">
            <input name="vencimientoTarjeta" placeholder="MM/AA" class="input campo" id="cardDate" maxlength="5" inputmode="numeric">
            <input name="cvvTarjeta" placeholder="CVV" class="input campo" id="cardCVV" maxlength="4" inputmode="numeric">
          </div>
        </div>

        <!-- BANCO -->
        <div class="metodo border rounded p-4 mb-4 transition">
          <label class="flex justify-between mb-2 cursor-pointer">
            <div class="flex gap-2">
              <input type="radio" name="metodo_pago" value="banco">
              <span>Banco</span>
            </div>

            <div class="flex gap-2 items-center">
              <img src="Bancos/BBVA-logo.png" alt="BBVA" class="h-6 object-contain">
              <img src="Bancos/Itau.jpg" alt="Itaú" class="h-6 object-contain">
              <img src="Bancos/HSBC_Logo_2018.png" alt="HSBC" class="h-6 object-contain">
              <img src="Bancos/Logo_Scotiabank_(Kanada).svg.png" alt="Scotiabank" class="h-6 object-contain">
              <img src="Bancos/Santander_Logo.PNG" alt="Santander" class="h-6 object-contain">
            </div>
          </label>

          <select class="input campo w-full" id="bankSelect" name="banco">
            <option value="">Selecciona tu banco</option>
            <option value="BROU">BROU</option>
            <option value="Santander">Santander</option>
            <option value="Itaú">Itaú</option>
            <option value="BBVA">BBVA</option>
            <option value="HSBC">HSBC</option>
            <option value="Scotiabank">Scotiabank</option>
          </select>
        </div>

        <!-- EFECTIVO -->
        <div class="metodo border rounded p-4 transition">
          <label class="flex justify-between mb-2 cursor-pointer">
            <div class="flex gap-2">
              <input type="radio" name="metodo_pago" value="efectivo">
              <span>Efectivo</span>
            </div>
            <div class="flex gap-2">
              <img src="Efectivo/abitab_icon.jpg" alt="Abitab" class="h-6 object-contain">
              <img src="Efectivo/logo-red-pagos-e1565408024839.jpg" alt="RedPagos" class="h-6 object-contain">
            </div>
          </label>

          <p class="text-sm text-gray-500">Abitab o RedPagos</p>
        </div>

      </section>

    </div>

    <!-- DERECHA -->
    <div class="bg-gray-50 p-4 rounded h-fit">

      <h2 class="font-semibold mb-4">Resumen</h2>

      <div class="flex justify-between">
        <span>Subtotal</span>
        <span id="subtotal">$2000</span>
      </div>

      <div id="descuentoBox" class="flex justify-between text-green-600 hidden">
        <span>Descuento</span>
        <span id="descuento"></span>
      </div>

      <div id="ahorro" class="text-green-600 text-sm hidden"></div>

      <div class="flex justify-between">
        <span>Impuestos</span>
        <span>$200</span>
      </div>

      <hr class="my-3">

      <div class="flex justify-between text-lg font-bold" id="totalBox">
        <span>Total</span>
        <span id="total">$2200</span>
      </div>

      <button type="submit" class="w-full bg-black text-white py-3 mt-4 rounded">
        Confirmar compra
      </button>

    </div>

  </form>

</main>

<style>
.input {
  border: 1px solid #ccc;
  padding: 8px;
  border-radius: 6px;
  width: 100%;
}

.error {
  border-color: red;
}

.metodo {
  transition: 0.3s;
}

.metodo.opacity-50 {
  opacity: 0.5;
}
</style>

<script>
const subtotal = 2000;
const impuestos = 200;

const metodos = document.querySelectorAll(".metodo");
const totalEl = document.getElementById("total");

function actualizar() {
  let metodo = "tarjeta";

  metodos.forEach(m => {
    const radio = m.querySelector("input");
    const campos = m.querySelectorAll(".campo");

    if (radio.checked) {
      metodo = radio.value;

      m.classList.remove("opacity-50");
      campos.forEach(c => c.disabled = false);
    } else {
      m.classList.add("opacity-50");
      campos.forEach(c => c.disabled = true);
    }
  });

  calcularTotal(metodo);
}

function calcularTotal(metodo) {
  let descuento = 0;

  if (metodo === "tarjeta") {
    descuento = subtotal * 0.15;

    document.getElementById("descuentoBox").classList.remove("hidden");
    document.getElementById("ahorro").classList.remove("hidden");
    document.getElementById("ahorro").innerText = "Ahorras $" + descuento.toFixed(0);
  } else {
    document.getElementById("descuentoBox").classList.add("hidden");
    document.getElementById("ahorro").classList.add("hidden");
  }

  const total = subtotal - descuento + impuestos;

  document.getElementById("descuento").innerText = "-$" + descuento.toFixed(0);
  totalEl.innerText = "$" + total.toFixed(0);
}

function validarTarjeta() {
  let valido = true;

  const number = document.getElementById("cardNumber");
  const cvv = document.getElementById("cardCVV");
  const date = document.getElementById("cardDate");

  number.classList.remove("error");
  cvv.classList.remove("error");
  date.classList.remove("error");

  const cleanNumber = number.value.replace(/\s+/g, "");
  const cleanCVV = cvv.value.trim();

  if (!/^\d{16}$/.test(cleanNumber)) {
    number.classList.add("error");
    valido = false;
  }

  if (!/^\d{3,4}$/.test(cleanCVV)) {
    cvv.classList.add("error");
    valido = false;
  }

  const dateMatch = date.value.match(/^(\d{2})\/(\d{2})$/);
  if (!dateMatch) {
    date.classList.add("error");
    valido = false;
  } else {
    const mes = Number(dateMatch[1]);
    const anio = Number(dateMatch[2]);

    const ahora = new Date();
    const mesActual = ahora.getMonth() + 1;
    const anioActual = ahora.getFullYear() % 100;

    if (mes < 1 || mes > 12 || anio < anioActual || (anio === anioActual && mes < mesActual)) {
      date.classList.add("error");
      valido = false;
    }
  }

  return valido;
}

document.querySelectorAll("input[name=metodo_pago]").forEach(r => {
  r.addEventListener("change", actualizar);
});

document.getElementById("bankSelect").addEventListener("change", e => {
  e.target.classList.remove("error");
});

document.getElementById("checkoutForm").addEventListener("submit", e => {
  const metodo = document.querySelector("input[name=metodo_pago]:checked").value;
  let valido = false;

  if (metodo === "tarjeta") {
    if (validarTarjeta()) valido = true;
    else alert("⚠️ Completa correctamente los datos de la tarjeta");
  }

  if (metodo === "banco") {
    const banco = document.getElementById("bankSelect");

    const bankUrls = {
      BROU: "https://www.brou.com.uy",
      Santander: "https://www.santander.com.uy",
      Itaú: "https://www.itau.com.uy",
      BBVA: "https://www.bbva.com.uy",
      HSBC: "https://www.hsbc.com.uy",
      Scotiabank: "https://www.scotiabank.com.uy"
    };

    if (banco.value === "") {
      banco.classList.add("error");
      alert("⚠️ Debes seleccionar un banco");
    } else {
      e.preventDefault();
      const url = bankUrls[banco.value];
      if (!url) {
        alert("⚠️ Banco no válido");
        return;
      }
      window.location.href = url;
      return;
    }
  }

  if (metodo === "efectivo") {
    valido = true;
  }

  if (!valido) e.preventDefault();
});

actualizar();
</script>

<!-- FOOTER / COPYRIGHT -->
<footer class="mt-16 text-center text-sm text-gray-500 py-6">
  © <span id="year"></span> Checkout PRO. Todos los derechos reservados.
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
